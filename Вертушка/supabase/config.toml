# Локальный Supabase для разработки Вертушки.
# Нам нужен только Postgres + Studio (UI). Остальное выключено для экономии RAM/CPU.
#
# Запуск:  npx supabase start
# Стоп:    npx supabase stop
#
# Подключиться извне:
#   - Postgres:  postgresql://postgres:postgres@127.0.0.1:54322/postgres
#   - Studio:    http://127.0.0.1:54323

project_id = "vertushka"

[api]
enabled = true   # нужно для Supabase Studio (метаданные через PostgREST)
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = false

[realtime]
enabled = false

[analytics]
enabled = false
