version: '3.8'

services:
  # База данных PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: vertushka_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: vertushka
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis кэш
  redis:
    image: redis:7-alpine
    container_name: vertushka_redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API сервер (2 воркера)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vertushka_api
    restart: always
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/vertushka
      - REDIS_URL=redis://redis:6379/0
      - IS_SCHEDULER=false
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Планировщик задач (отдельный контейнер, 1 воркер)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vertushka_scheduler
    restart: always
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/vertushka
      - REDIS_URL=redis://redis:6379/0
      - IS_SCHEDULER=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 1
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: vertushka_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx
      - uploads_data:/app/uploads:ro      # nginx раздаёт обложки как статику
    depends_on:
      - api
      - metabase

  # Certbot для SSL сертификатов
  certbot:
    image: certbot/certbot
    container_name: vertushka_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  # Metabase (BI дашборды поверх Postgres)
  # UI слушает на 127.0.0.1:3000 — открывать через SSH-туннель или nginx-проксирование
  metabase:
    image: metabase/metabase:v0.50.21
    container_name: vertushka_metabase
    restart: always
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_URL: ${METABASE_SITE_URL:-http://localhost:3000}
      JAVA_TIMEZONE: Europe/Moscow
    volumes:
      - metabase_data:/metabase-data
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  nginx_cache:
  metabase_data:
